# VCP Volatility Contraction Pattern Strategy / VCP波动率收缩形态
# 基于马克·米勒维尼理论，股价在Stage 2上升趋势中形成收缩序列，波动率逐步递减后突破轴心点。

name: vcp_breakout
display_name: VCP波动率收缩
description: 识别米勒维尼VCP形态——Stage 2趋势模板确认后，价格形成3-4次幅度递减的收缩序列，低点逐步抬升、量能同步萎缩，最终突破轴心点（阻力位）。
category: breakout
core_rules: [1, 2]
required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **VCP波动率收缩形态（Volatility Contraction Pattern Strategy）**

  基于马克·米勒维尼《股票魔法师》VCP理论，完整判定标准：

  1. **Stage 2 趋势模板（Minervini Trend Template）**（硬性前提）：
     - 使用 `get_daily_history`（至少250日日线数据）。
     - C1: 当前价格 > MA50。
     - C2: MA50 > MA150。
     - C3: MA150 > MA200。
     - C4: MA200 处于上升趋势（当前 MA200 > 30天前 MA200）。
     - C5: 当前价格距52周高点在 25% 以内（股票尚未过度延伸）。
     - C6: 当前价格比52周低点高 25% 以上（已确立上升趋势）。
     - 6条全部通过才进入VCP检测。`analyze_trend` → trend_status 应为 BULL 或 STRONG_BULL。

  2. **前期上涨蓄能**（软性条件）：
     - VCP形成前45-120个交易日内，股价涨幅 ≥ 15%。
     - 线性回归斜率 > 0，确认上涨趋势而非底部震荡。
     - 这是"整理"而非"筑底"，前期必须有蓄能。

  3. **VCP收缩序列（T序列）**（硬性条件）：
     - 通过 scipy.signal.argrelextrema 识别局部高/低点。
     - 至少3次收缩（T1→T2→T3），最多4次（T4为可选最小收缩）。
     - 典型幅度：T1: 15-30% → T2: 8-15% → T3: 5-8% → T4: 3-5%。
     - **收缩幅度严格递减**：每个T的回撤幅度必须小于前一个，相邻差值 ≥ 1-3%。
     - T1到Tn总体递减 ≥ 8-10%。
     - 单次收缩幅度范围：最小5%，第一次最大30-35%。

  4. **低点逐步抬升（重心上移）**：
     - 每个收缩的低点 ≥ 前一个收缩的低点（允许2-3%波动容差）。
     - 低点总体上升 ≥ 3-5%。
     - 体现买方力量逐步增强。

  5. **时间窗口递减**（软性条件）：
     - 每个收缩的时间跨度应越来越短。
     - 至少40-50%的收缩对时间递减。
     - 体现卖压逐步耗尽，收敛加速。

  6. **成交量递减**（软性条件）：
     - VCP期间成交量从左到右递减。
     - 至少20-30%的收缩对成交量递减。
     - 成交量萎缩表明浮筹已被充分消化。

  7. **轴心点与突破分类**：
     - **轴心点（Pivot Point）**= VCP区域内最高高点（阻力位）。
     - **即将突破（near_breakout）**：当前价格距轴心点 ≤ 8%。
     - **已突破（breakout）**：当前价格 > 轴心点 × 1.01（超过1%）。
     - **形成中（forming）**：符合VCP但距轴心点 > 8%。
     - 突破时成交量放大 ≥ 20%以上为理想突破。

  8. **VCP评分体系**（满分100分）：
     - A. 收缩次数（20-30分）：T3=20分，T4=30分（4次收缩更成熟）。
     - B. 最后收缩幅度（10-25分）：<5%=25分，5-8%=18分，8-12%=10分（越小越紧凑）。
     - C. 距轴心点距离（8-20分）：<2%=20分，2-5%=14分，5-8%=8分（越近越好）。
     - D. 量能递减质量（最高15分）：量能递减比例 × 15。
     - E. 收缩总体递减幅度（最高10分）：(T1-Tn)/T1 × 10。

  9. **风险提示**（关联理念2：趋势交易）：
     - VCP是上升趋势中的整理形态，属于顺势操作，成功率较高。
     - 但若Stage 2趋势模板不满足，不可强行套用。
     - 止损设在最后一个收缩低点或轴心点下方5-8%。
     - 突破失败（价格跌回轴心点下方）应及时止损。
     - 仓位配合评分：高分（>70）可正常仓位，中分（50-70）减半，低分（<50）观望。

  评分调整：
  - VCP形态确认（near_breakout）：sentiment_score +8
  - VCP突破确认（breakout + 放量）：sentiment_score +12
  - Stage 2趋势模板6条全过：额外 +3
  - VCP评分 > 70：额外 +5
  - 在 `buy_reason` 中注明"VCP波动率收缩突破"及VCP评分。
  - 在 `pattern_analysis` 中注明轴心点价格、收缩次数、各T幅度、距轴心距离。
  - 止损设在最后一个收缩低点下方。
