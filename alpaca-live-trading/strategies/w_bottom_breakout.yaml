# W-Bottom Neckline Breakout Strategy / W底颈线突破
# 股价形成W底（双底），多次触碰颈线后接近或突破阻力位，配合多维度筛选与评分排序。

name: w_bottom_breakout
display_name: W底颈线突破
description: 识别W底（双底）形态，通过高点颈线+低点支撑线构建通道，筛选接近突破与已突破的股票，并按底部稳定性与赔率多维评分排序。
category: breakout
core_rules: [2, 5]
required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **W底颈线突破（W-Bottom Neckline Breakout Strategy）**

  形态识别与突破判定标准：

  1. **W底形态识别**：
     - 使用 `get_daily_history`（建议 1-2 年日线数据）。
     - 通过 scipy.signal 识别股价高点与低点，合并相邻的高/低点（10日内、价差<3%），提高信号质量。
     - 至少需要 3 个有效高点形成颈线（阻力线），优先选择水平趋势线，必要时允许倾斜趋势线。
     - 颈线优化：减少切割K线实体，允许切割上影线；触碰+接近之和 >= 2倍切割数。
     - 同时识别低点支撑线，构建完整的W底通道。

  2. **突破状态判定**：
     - **接近突破（near_breakout）**：收盘价在支撑线与颈线之间，且距颈线 ≤ 5%。
     - **已突破（breakout）**：最高价已超过颈线价格。
     - 已突破时额外检查：突破后实体在颈线上方的K线不超过5根（防止假突破后远离）。

  3. **上方实体条件**（硬性筛选）：
     - 近250个交易日内，颈线上方的K线实体（不含上影线）不超过10根。
     - 上方K线实体的最高价不超过颈线价格的10%。
     - 不满足则直接剔除。

  4. **融资余额条件**（可选，enable_margin_filter）：
     - a = (前一日融资余额 - 近一年融资余额最低值) / 近一年融资余额最低值
     - b = (前一日收盘价 - 近一年最低收盘价) / 近一年最低收盘价
     - 要求 a < b（融资余额增长率 < 价格增长率），说明筹码相对干净。

  5. **财务成长条件**（可选，enable_financial_filter）：
     - 最新可用季度营业收入 / 5年前同季度营业收入 > 1.6。
     - 最新可用季度营业利润 / 5年前同季度营业利润 > 1.6。
     - 确保标的具备中长期基本面成长。

  6. **财务真实性条件**（可选，enable_authenticity_filter）：
     - 现金营收比值 = (销售商品收到的现金 + 应收变动 - 预付变动 - 存货变动) / 营业收入。
     - 要求 现金营收比值 >= 0.8，排除财务造假嫌疑。

  7. **多维评分排序**（关联理念2：趋势交易 + 理念5：风险排查）：

     **第一步 — 波动率预筛选**：
     - 按底部区间日对数收益标准差（实现波动率）升序，只保留前30名。
     - 波动率越低 -> 底部越稳定。

     **第二步 — 综合评分**（满分160分）：
     - 时间跨度得分（满分40）：左碗沿到右碗沿天数越长越好，第1名40分，逐级递减，31名后得10分。
     - 波动率得分（满分30）：在前30名内按波动率排名，第1名30分，逐级递减。
     - 底部到颈线空间得分（满分30）：D/颈线价格越大赔率越高，第1名30分，逐级递减，31名后得0分。
     - 自由现金流比值得分（满分30）：自由现金流/实际收购价值比值越高越好，按排名给分。
     - RPS120得分（满分15）：相对强度排名，第1名15分，每名递减0.5。
     - RPS250得分（满分15）：相对强度排名，第1名15分，每名递减0.5。
     - **综合得分 = 时间跨度 + 波动率 + 底部到颈线 + 自由现金流 + RPS120 + RPS250**。

  8. **风险提示**（关联理念5：风险排查）：
     - near_breakout 为未突破信号，需等待突破确认再加仓。
     - breakout 需关注突破后K线是否在颈线上方站稳（实体在颈线上方 <= 5根视为合理回踩）。
     - 颈线即为关键支撑，止损设在颈线下方或底部区间最低收盘价。
     - 仓位配合综合评分：高分标的可适当加仓，低分标的控制仓位。

  评分调整：
  - W底形态确认（near_breakout）：sentiment_score +6
  - W底突破确认（breakout）：sentiment_score +10
  - 综合评分 top 5：额外 +5
  - 在 `buy_reason` 中注明"W底颈线突破"及综合评分。
  - 在 `pattern_analysis` 中注明颈线价格、支撑价格、底部到颈线空间比值。
  - 止损设在颈线下方或底部区间最低收盘价。
