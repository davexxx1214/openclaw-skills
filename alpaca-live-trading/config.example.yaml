# Alpaca Live Trading Skill - API 配置模板
# 复制此文件为 config.yaml 并填入真实的 API Key
#   cp config.example.yaml config.yaml

# AlphaVantage API - 用于获取股价数据和市场新闻
# 申请地址: https://www.alphavantage.co/support/#api-key
alphavantage:
  api_key: "your_alphavantage_api_key"

# Alpaca Trading API - 用于查询账户和执行交易
# 申请地址: https://app.alpaca.markets/paper/dashboard/overview
# paper: true 表示模拟交易，false 表示真实交易
alpaca:
  api_key: "your_alpaca_api_key"
  secret_key: "your_alpaca_secret_key"
  paper: true

# Polymarket - 不需要 API Key（公开 API）

# 策略执行配置（自动生成交易计划）
strategy:
  enabled: true
  names:
    - news_momentum
    - market_gate_trend
  # 信号置信度阈值（0-1）
  min_confidence: 0.6

# 基础风控配置
risk:
  # 单只标的最大仓位占账户现金比例（0-1）
  max_position_pct: 0.1
  # 最大持仓标的数
  max_positions: 5
  # 单笔交易最大金额（美元）
  max_trade_notional: 2000
